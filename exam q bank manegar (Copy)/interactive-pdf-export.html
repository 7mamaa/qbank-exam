<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تصدير PDF تفاعلي - QBank</title>
    
    <!-- مكتبات توليد PDF -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js" integrity="sha384-M6V6K1mZ8P2Vq9f+A9p9f9f9f9f9f9f9f9f9f9f9f9f9f9f9f9f9f" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit/dist/fontkit.umd.min.js" integrity="sha384-fV6K1mZ8P2Vq9f+A9p9f9f9f9f9f9f9f9f9f9f9f9f9f9f9f9f9f" crossorigin="anonymous"></script>
    <script src="lib/arabic-reshaper.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bidi-js@1.0.3/dist/bidi.min.js" integrity="sha384-6S9+K1mZ8P2Vq9f+A9p9f9f9f9f9f9f9f9f9f9f9f9f9f9f9f9f9f" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #4361ee;
            --primary-hover: #3b52d0;
            --border: #334155;
            --radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            color: var(--primary);
            text-align: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        select, input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .status {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>تصدير PDF تفاعلي</h1>
        
        <div class="form-group">
            <label for="notebook-select">اختر الدفتر:</label>
            <select id="notebook-select">
                <option value="all">جميع الأسئلة</option>
                <!-- سيتم ملء الدفاتر هنا -->
            </select>
        </div>

        <div class="form-group">
            <label for="q-type-select">نوع الأسئلة:</label>
            <select id="q-type-select">
                <option value="all">الكل</option>
                <option value="mcq">اختيار من متعدد</option>
                <option value="boolean">صح وخطأ</option>
                <option value="written">مقالي</option>
            </select>
        </div>

        <div class="form-group">
            <label for="q-difficulty-select">مستوى الصعوبة:</label>
            <select id="q-difficulty-select">
                <option value="all">الكل</option>
                <option value="easy">سهل</option>
                <option value="medium">متوسط</option>
                <option value="hard">صعب</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label for="q-count">عدد الأسئلة (0 للكل):</label>
                <input type="number" id="q-count" value="0" min="0">
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="q-randomize">الترتيب:</label>
                <select id="q-randomize">
                    <option value="no">أصلي</option>
                    <option value="yes">عشوائي</option>
                </select>
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label for="pdf-direction">اتجاه ولغة الاختبار:</label>
                <select id="pdf-direction">
                    <option value="rtl">عربي (يمين لليسار)</option>
                    <option value="ltr">إنجليزي (يسار لليمين)</option>
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="pdf-title">عنوان الملف:</label>
                <input type="text" id="pdf-title" value="اختبار تفاعلي" placeholder="اكتب عنوان الاختبار...">
            </div>
        </div>

        <button id="generate-btn" onclick="generateInteractivePDF()">توليد وتحميل PDF</button>
        <div id="status-msg" class="status">جاهز لقراءة قاعدة البيانات...</div>
    </div>

    <script>
        const statusEl = document.getElementById('status-msg');
        const btn = document.getElementById('generate-btn');
        let questionsData = [];
        let notebooksData = [];

        // 1. الاتصال بقاعدة البيانات IndexedDB وجلب البيانات
        async function loadData() {
            statusEl.textContent = 'جاري الاتصال بقاعدة البيانات...';
            btn.disabled = true;

            try {
                const db = await new Promise((resolve, reject) => {
                    const req = indexedDB.open('QBankDB', 1);
                    req.onsuccess = (e) => resolve(e.target.result);
                    req.onerror = (e) => reject(e.target.error);
                });

                // جلب الدفاتر
                notebooksData = await new Promise((resolve, reject) => {
                    const tx = db.transaction('notebooks', 'readonly');
                    const store = tx.objectStore('notebooks');
                    const req = store.getAll();
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });

                // جلب الأسئلة
                questionsData = await new Promise((resolve, reject) => {
                    const tx = db.transaction('questions', 'readonly');
                    const store = tx.objectStore('questions');
                    const req = store.getAll();
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });

                // ملء القائمة المنسدلة
                const select = document.getElementById('notebook-select');
                notebooksData.forEach(nb => {
                    const opt = document.createElement('option');
                    opt.value = nb.id;
                    opt.textContent = nb.name;
                    select.appendChild(opt);
                });

                statusEl.textContent = `تم تحميل ${questionsData.length} سؤال من قاعدة البيانات.`;
                btn.disabled = false;
            } catch (err) {
                console.error(err);
                statusEl.textContent = 'حدث خطأ أثناء قراءة قاعدة البيانات: ' + err.message;
            }
        }

        // دالة مساعدة لمعالجة النصوص (RTL/LTR)
        function processArabicText(text, isRTL = true) {
            if (!text) return '';
            if (!isRTL) return text; // للإنجليزي لا داعي للمعالجة
            try {
                if (window.arabicReshaper && window.arabicReshaper.reshape) {
                    text = window.arabicReshaper.reshape(text);
                }
                return text.split('').reverse().join('');
            } catch (e) {
                return text.split('').reverse().join('');
            }
        }

        // 2. توليد الـ PDF
        async function generateInteractivePDF() {
            statusEl.textContent = 'جاري تجهيز وبناء الملف، يرجى الانتظار...';
            btn.disabled = true;

            try {
                const selectedNb = document.getElementById('notebook-select').value;
                const pdfTitle = document.getElementById('pdf-title').value;

                let pool = questionsData;
                if (selectedNb !== 'all') {
                    pool = questionsData.filter(q => q.notebookId === selectedNb);
                }

                const qType = document.getElementById('q-type-select').value;
                if (qType !== 'all') pool = pool.filter(q => q.type === qType);

                const qDiff = document.getElementById('q-difficulty-select').value;
                if (qDiff !== 'all') pool = pool.filter(q => q.difficulty === qDiff);

                const randomize = document.getElementById('q-randomize').value;
                if (randomize === 'yes') {
                    // Fisher-Yates shuffle لضمان عشوائية حقيقية
                    for (let i = pool.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [pool[i], pool[j]] = [pool[j], pool[i]];
                    }
                }

                const limitCount = parseInt(document.getElementById('q-count').value, 10);
                if (limitCount > 0 && limitCount < pool.length) {
                    pool = pool.slice(0, limitCount);
                }

                if (pool.length === 0) {
                    alert('لا توجد أسئلة في هذا الدفتر.');
                    btn.disabled = false;
                    statusEl.textContent = 'الدفتر فارغ.';
                    return;
                }

                const { PDFDocument, rgb, StandardFonts } = PDFLib;
                const pdfDoc = await PDFDocument.create();
                
                // تسجيل fontkit للخطوط المخصصة
                pdfDoc.registerFontkit(fontkit);

                // تحميل خط عربي (Cairo)
                statusEl.textContent = 'جاري تحميل الخط العربي...';
                const fontUrl = 'https://fonts.gstatic.com/s/cairo/v31/SLXgc1nY6HkvangtZmpQdkhzfH5lkSs2SgRjCAGMQ1z0hOA-W1ToKw-G.ttf';
                let fontBytes;
                try {
                    const res = await fetch(fontUrl);
                    if (!res.ok) throw new Error("Failed to fetch font");
                    fontBytes = await res.arrayBuffer();
                } catch(e) {
                    // Fallback to a base64 font or fail if network is down
                    throw new Error("فشل تحميل الخط العربي، تأكد من اتصال الإنترنت.");
                }
                const arabicFont = await pdfDoc.embedFont(fontBytes);

                statusEl.textContent = 'جاري رسم الأسئلة...';

                // إعدادات الصفحة
                const margin = 50;
                const pageWidth = 600;
                const pageHeight = 800;
                let yCursor = pageHeight - margin - 30;
                let page = pdfDoc.addPage([pageWidth, pageHeight]);
                const form = pdfDoc.getForm();

                const isRTL = document.getElementById('pdf-direction').value === 'rtl';

                // دالة مساعدة لتقطيع النصوص الطويلة ورسمها بمرونة (Word Wrap)
                const renderWrappedText = (text, size, yStart, maxWidth, color = rgb(0, 0, 0)) => {
                    const words = text.split(' ');
                    let currentLine = '';
                    let currentY = yStart;
                    const lineHeight = size * 1.5;

                    for (let i = 0; i < words.length; i++) {
                        const word = words[i];
                        const testLine = currentLine === '' ? word : currentLine + ' ' + word;
                        const processedTest = processArabicText(testLine, isRTL);
                        const testWidth = arabicFont.widthOfTextAtSize(processedTest, size);

                        if (testWidth > maxWidth && currentLine !== '') {
                            const processedLine = processArabicText(currentLine, isRTL);
                            const lineWidth = arabicFont.widthOfTextAtSize(processedLine, size);
                            const x = isRTL ? pageWidth - margin - lineWidth : margin;
                            page.drawText(processedLine, { x, y: currentY, size, font: arabicFont, color });
                            
                            currentLine = word;
                            currentY -= lineHeight;
                            
                            if (currentY < margin + 20) {
                                page = pdfDoc.addPage([pageWidth, pageHeight]);
                                currentY = pageHeight - margin;
                            }
                        } else {
                            currentLine = testLine;
                        }
                    }

                    if (currentLine !== '') {
                        const processedLine = processArabicText(currentLine, isRTL);
                        const lineWidth = arabicFont.widthOfTextAtSize(processedLine, size);
                        const x = isRTL ? pageWidth - margin - lineWidth : margin;
                        page.drawText(processedLine, { x, y: currentY, size, font: arabicFont, color });
                        currentY -= lineHeight;
                    }
                    
                    return currentY; 
                };

                // رسم الترويسة
                const processedTitle = processArabicText(pdfTitle, isRTL);
                const titleWidth = arabicFont.widthOfTextAtSize(processedTitle, 24);
                page.drawText(processedTitle, {
                    x: (pageWidth - titleWidth) / 2, y: yCursor, size: 24, font: arabicFont, color: rgb(0.1, 0.3, 0.8)
                });
                yCursor -= 50;

                // رسم الأسئلة
                pool.forEach((q, idx) => {
                    if (yCursor < margin + 60) {
                        page = pdfDoc.addPage([pageWidth, pageHeight]);
                        yCursor = pageHeight - margin;
                    }

                    // خط فاصل بين الأسئلة
                    if (idx > 0) {
                        page.drawLine({
                            start: { x: margin, y: yCursor + 25 },
                            end: { x: pageWidth - margin, y: yCursor + 25 },
                            thickness: 1,
                            color: rgb(0.9, 0.9, 0.9)
                        });
                    }

                    // رقم وسؤال
                    const qText = isRTL ? `${q.question} .${idx + 1}` : `${idx + 1}. ${q.question}`;
                    yCursor = renderWrappedText(qText, 14, yCursor, pageWidth - (margin * 2), rgb(0.15, 0.15, 0.15));
                    yCursor -= 5;

                    // رسم الخيارات حسب النوع
                    if (q.type === 'mcq' && q.options) {
                        q.options.forEach((opt, oIdx) => {
                            if (yCursor < margin + 20) {
                                page = pdfDoc.addPage([pageWidth, pageHeight]);
                                yCursor = pageHeight - margin;
                            }
                            
                            const cbName = `q_${idx}_opt_${oIdx}`;
                            const checkBox = form.createCheckBox(cbName);
                            
                            const optText = processArabicText(opt, isRTL);
                            const optWidth = arabicFont.widthOfTextAtSize(optText, 12);
                            const boxSize = 12;
                            
                            const boxX = isRTL ? pageWidth - margin - boxSize : margin;
                            const textX = isRTL ? pageWidth - margin - boxSize - 10 - optWidth : margin + boxSize + 10;

                            checkBox.addToPage(page, { x: boxX, y: yCursor - 2, width: boxSize, height: boxSize });
                            page.drawText(optText, { x: textX, y: yCursor, size: 12, font: arabicFont });
                            
                            yCursor -= 22;
                        });
                    } else if (q.type === 'boolean') {
                        const trueStr = isRTL ? "صح" : "True";
                        const falseStr = isRTL ? "خطأ" : "False";
                        
                        const trueText = processArabicText(trueStr, isRTL);
                        const falseText = processArabicText(falseStr, isRTL);
                        
                        const tWidth = arabicFont.widthOfTextAtSize(trueText, 12);
                        const fWidth = arabicFont.widthOfTextAtSize(falseText, 12);
                        const boxSize = 12;
                        
                        // Option 1
                        let box1X = isRTL ? pageWidth - margin - boxSize : margin;
                        let text1X = isRTL ? box1X - 10 - tWidth : box1X + boxSize + 10;
                        const cbTrue = form.createCheckBox(`q_${idx}_true`);
                        cbTrue.addToPage(page, { x: box1X, y: yCursor - 2, width: boxSize, height: boxSize });
                        page.drawText(trueText, { x: text1X, y: yCursor, size: 12, font: arabicFont });

                        // Option 2
                        let box2X = isRTL ? pageWidth - margin - 100 - boxSize : margin + 100;
                        let text2X = isRTL ? box2X - 10 - fWidth : box2X + boxSize + 10;
                        const cbFalse = form.createCheckBox(`q_${idx}_false`);
                        cbFalse.addToPage(page, { x: box2X, y: yCursor - 2, width: boxSize, height: boxSize });
                        page.drawText(falseText, { x: text2X, y: yCursor, size: 12, font: arabicFont });
                        
                        yCursor -= 25;
                    } else if (q.type === 'written') {
                        if (yCursor < margin + 80) {
                            page = pdfDoc.addPage([pageWidth, pageHeight]);
                            yCursor = pageHeight - margin;
                        }
                        const textField = form.createTextField(`q_${idx}_text`);
                        textField.addToPage(page, { 
                            x: margin, 
                            y: yCursor - 60, 
                            width: pageWidth - (margin * 2), 
                            height: 60,
                            font: arabicFont 
                        });
                        yCursor -= 75;
                    }

                    yCursor -= 15; 
                });

                // حفظ وتحميل
                statusEl.textContent = 'جاري حفظ الملف...';
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Interactive_Test_${Date.now()}.pdf`;
                link.click();

                statusEl.textContent = 'تم التصدير بنجاح!';
            } catch (err) {
                console.error(err);
                alert('حدث خطأ: ' + err.message);
                statusEl.textContent = 'فشل التصدير.';
            } finally {
                btn.disabled = false;
            }
        }

        // بدء التحميل عند فتح الصفحة
        window.onload = loadData;
    </script>
</body>
</html>

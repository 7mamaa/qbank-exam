<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QBank | منظم التكرارات الذكي</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        body { background: var(--bg-main); min-height: 100vh; padding-top: 20px; }
        .standalone-container { max-width: 1000px; margin: 0 auto; padding: 20px; width: 100%; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: var(--card-bg); padding: 20px 30px; border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow-md); }
        .page-title h1 { font-size: 1.5rem; color: var(--primary); margin-bottom: 5px; }
        .page-title p { color: var(--text-secondary); font-size: 0.9rem; }
        .dup-controls-bento { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        .control-card { background: var(--card-bg); padding: 25px; border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px; }
        .scan-action { justify-content: center; align-items: center; text-align: center; }
        .progress-container { width: 100%; height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary); transition: width 0.3s ease; }

        @media (max-width: 768px) {
            .page-header { flex-direction: column; text-align: center; gap: 20px; padding: 20px; }
            .dup-controls-bento { grid-template-columns: 1fr; }
            .standalone-container { padding: 10px; }
            .btn { width: 100%; min-height: 44px; }
        }
    </style>
</head>
<body>
    <div class="standalone-container">
        <!-- Header -->
        <header class="page-header">
            <div class="page-title">
                <h1>🛡️ منظم التكرارات الذكي</h1>
                <p>تنظيف وتطهير بنك الأسئلة من البيانات المكررة</p>
            </div>
            <a href="index.html" class="btn btn-secondary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                العودة للرئيسية
            </a>
        </header>

        <!-- Controls Bento -->
        <div class="dup-controls-bento">
            <div class="control-card">
                <label style="font-weight: 800; color: var(--text-title);">نسبة التشابه المطلوبة</label>
                <div style="display: flex; align-items: center; gap: 20px;">
                    <input type="range" id="dup-threshold-slider" min="50" max="100" value="85" style="flex: 1;">
                    <span id="dup-threshold-value" class="dup-sim-badge" style="font-size: 1.1rem; padding: 8px 15px;">85%</span>
                </div>
                <p style="font-size: 0.8rem; color: var(--text-secondary);">كلما انخفضت النسبة، زاد عدد النتائج (أكثر حساسية للفروق البسيطة).</p>
            </div>
            <div class="control-card scan-action">
                <button id="dup-scan-btn" class="btn btn-primary" style="width: 100%; padding: 15px;" onclick="window.DuplicateUI.startScan()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    بدء فحص التكرارات
                </button>
                <div class="progress-container">
                    <div id="dup-progress-fill" class="progress-fill"></div>
                </div>
            </div>
        </div>

        <!-- Summary & Batch -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 10px;">
            <div id="dup-summary" style="font-weight: 700; color: var(--text-body);">
                جاهز لبدء الفحص...
            </div>
            <button id="dup-merge-all-btn" class="btn btn-danger btn-sm" style="display: none;" onclick="window.DuplicateUI.mergeAll()">
                دمج الكل تلقائياً
            </button>
        </div>

        <!-- Results -->
        <div id="duplicate-manager-list" class="dup-results-area" style="max-height: none; overflow: visible;">
            <div class="dup-empty-state">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--border)" stroke-width="1"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <p>اضبط نسبة التشابه ثم اضغط على "بدء فحص التكرارات" للبدء.</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { DuplicateUI } from './src/modules/duplicates-ui.js';
        import { db } from './src/core/db.js';
        import { state } from './src/core/state.js';
        
        // Initialize Core first
        async function start() {
            await db.init();
            await state.loadInitialData();
            DuplicateUI.init();
        }
        start();
    </script>
</body>
</html>
